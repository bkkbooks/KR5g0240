body:
  text: 仙傳拾遺四十卷劉根真君傳王玲真人修行記真係傅道學傳寳應傳總仙極一百三十七卷太上老君青羊符瑞記二卷挑括大劫名山福地經二卷元中石室神宮異極太和樓觀内紀本章記瀬郷記太上老君岀寒記靈芝神萊瑞像記五卷十大洞天三十六小洞天記太上衆仙記青城山記一切道經音義一百五十卷太清金液神符經音義太清經六十二卷太平經太平行真一成道訣太平真一度世經訣三卷太清真人九丹神祕經太清金丹經紫陽金碧經三卷華子期角里先生修仙要訣金華玉女說丹華經玉笥山祖記實録武夷山記太清神仙服食經太清神臨藥經太清風露經太清變化經二卷太上老君法食禁戒經太極真人鳯鳴鑪火經西王母寳生无死養形吐納寶神經黃白五元神丹經大彭君訣神仙庚辛經神仙靈草鎮駐經三尸經天皇太一神律經二皇經五金髓經皇人守一經太上八景四蘂紫漿五珠絳生神丹玉經蓬壺集三卷攝生增益録太清服食五芝精經太玄三丹髙章經清靈真人裴君說神寳經赤松子養生疑命經逹雲經道家採形三一祕訣鍊花露仙醽訣大丹了心訣谷神妙訣三卷逍遙子內指通玄訣三卷服金丹應候訣神仙薬名隱訣太上正一真人還元圖像內丹歌訣太一真君元丹訣玉皇聖胎神用訣陳七子得道内真訣赤龍金虎中鉛錬七返丹沙訣九元子肉明訣修真符元洞幽訣更漏法象用水滴候經訣三元真一訣紫金白金丹訣內真妙用訣參同契金碧潜通訣太清内外神仙中經祕訣太上三昇玄醮法神仙九化法採服松葉等法古乀錬餌杏丹法淮王鍊聖石法拜祝別法黃茅河車制鍊諸薬法昇玄子造化伏汞圖狐剛子五金訣䟽狐剛子粉圖四卷參同契太易至圖經皇人三一圖訣導引圖三十六訣新說導引圖太一真人五行重玄論大丹㑹論神仙祕訣三卷頥神論二卷神仙長生藥述數術記遺五金題述元君辨金虎鉛汞造鼎入金祕真肘後方三卷養生諸神仙方三卷九真中經服餌仙方神丹三品鐵精方黃書八卷新修攝生祕㫖元氣論黄帝三陽經五明乾嬴神巴訣洞靈衆仙方三洞道士居山在世所須科二卷神仙食氣金匱妙籙神仙出世丹薬異名目録四序總要四卷真人長嘯㫖金石靈臺記太上真君石室記還丹金石極楊真人大丹手記葉天師杖中記正一修真玉經三卷正一法文玄妙經五卷正一法文天師㫖教經二卷正法文王趙太平問難經正太上真元正本法行經正一天師詣太上老君請問法經正一太上萬稱經正一法文盟威濟衆經七卷正一太微天尊說消災請雨經正一真科經正一法文法籙部正一肘後修用訣正一法文三天紫宫玉臺無極神仙紫籙正一法文五道八劵籙正一法文妙解籙正一並進籙正一法文天師符竅祝符文三卷正一三五存思妙圖二卷正一法文出官圖正一上元九星圖正一法文記傳正一考召斬邪引正一法文治病消災千二百官號正一二十四化記三卷正一天師墨教正一法文真科令正一法文左玄真人奉道科正一傳治儀正一法文傳都功版儀正一法文三師設治職儀正一法文修身齋儀正一法文六十卷天師永壽科太上老君宣告治祭酒經太上老君答尹喜問科經太上三五赤天元命法籙四卷太上三五神式真形籙太上洞神雷公法籙三卷太上黑天三五法籙品二卷太上老君逍遙籙太上正一盟威四部禁氣籙太上太清武甲籙大上七十二符儀太上正一功曹思神圖三卷太上三五正一盟威二十四神寳冠禁圖太上三五七九盟威神籙寳圖冠禁訣太上老君授雲臺山治官氣靈真内書太上老君傳正一天師印經太上淮南八㬰飛星冠斗金書玉籙太上符鑑太上玉帝章太上祕隠靈文三卷太上祕隱靈文照法太上修養祕訣仙經太上老君玉章篆文寳字符竅二卷太上神仙文甲籙太上老君紫府金丹玉籙書二卷太上洞玄救抜存亡生天妙經太上洞玄靈寳飛天大範十卷太上玄女厭怪符真君昇騰經三卷太清内景經太清經斷穀諸要法二卷太清經諸藥草木方集要太上靈樞神景内經九卷太上靈樞道言發微論二卷太上靈寳開光明经太上保天經太上靈寳十方應號天尊懺十卷太始天元玉册二十卷太始天元玉册元誥扁注八太始天元玉册截法六卷天元祕演十卷太清火式經太極元化先天袐要指歸三卷太清指真胎息祕訣日月顯真論太上絳嚢經太上靈寳天公經開度品一卷太上靈寳天公經應機品一卷太上靈寳天公經統御品一卷太上靈寳生宅妙經太上三都仙經太上三世天尊抜度九幽解脫三㑹經太上𩱿𩲸經五星真形圖洞極真經天師玉清金藏經神仙威武勝籙制虎符訣石室圖内八卦繫辭皇王元首禁法二卷中嶽太神教通山宮見仙聖法印治百病存思立成訣髙道傳十卷真一赤界條檢許真君雜忌法度人寳珠妙義四卷玉帝賦金液指掌訣金石靈臺刊謬訣雜金石薬法靈竒祕興三卷紫府玄珠十卷罔象成名圖衆仙諭二卷神異經二卷三洞四階宗師譜畧宋梓州天慶觀道經藏記太一衛靈神呪經鑪火寳藏論二卷三元太妙經正一澄心論太上天寳靈樞金鑑神景内經九卷三天真皇說太上紫神兵䕶國消魔經素靈中篇丹臺新録北帝紫微玄律經二卷紫廓神護論三皇太古書山墳經一卷三皇太古書氣墳經一卷三皇太古書形墳經一卷金書玉劵心印胎息蛻殼妙道經仙翁鍊聖石神妙訣九室指玄篇李八伯服食方食草木法造化權與六卷靈竒祕與墨子術仙隠傳十卷仙人水鑑圖還丹契祕圖雲母論二卷道教宗㫖元始珠無量義論日月玄樞論南華真經統論希夷陳先生三峯寓言詩張果老絶句詩鍾離真人聚玉篇歷鑒天元主物簿三卷左慈真人助相規戒辯訛三教摭寳根源圖古書禽經黃帝北斗神光經黃帝神竈經三卷錬真成道經上清無上大道法母元君說太陽元精經上清金華玉女說丹華經上清黄庭二景三皇肉譜天寳度人仙經二卷馮壽康註太上洞玄靈寳無量度人上品妙經傍通圖河圖上篇三五龜文符圖一卷河圖上篇三五歩綱經一卷河圖上篇三五要言一卷河圖上篇三五禮醮儀一卷水玉訣皇人授黃帝三一昇玄圖訣太上靈寳三清聖號經最上乗元礙經乾生歸一圖十卷太上萬靈訣天剛武威斗璇璣決勝三卷道樞極玄論上清交車畢道紫華素蓋藉地騰天經紫㣲肉庭祕籙三卷神仙真一祕籙紫庭經北帝天蓬法文二卷翊聖真君九仙玉景經玉清金紫長生經太上赤天三籙經太清紫字玉訣房山長太纂符森羅萬像北斗星君圖真仙傳道集内存想圖真仙傳道祕要集三卷玄都紫微上宫天心正法明輪大梵玉字隠書五卷黃帝玉房祕訣修真訣百章集中黃子還丹指要詩棲神子指玄篇河圖金鼎長生法祭神經保聖長生經三卷日月顯真論二卷內修經玄機集隂陽統畧五行圖金液玉景圖集録古今服食藥方三卷金石藥方二卷修真内象圖要訣十二卷儀真媳鑑黃白神竈雜訣三卷二十四鼎鑪圖法黃帝授天老服食仙方仙公藥要雜訣黃帝鼎圖鐵粉論淮南王鍊金丹至藥訣靈芝草通玄先生張果隠化法神仙留形住世法菊潭法諸仙奥㫖通玄顯微論朱懌還丹太一論悟塵子還丹精微論張真君五清論務玄子混咸論朝元子五太論金華真人授道誌煉精存珠玉霞篇劉嵩註珞琭子註玄筌神仙肘後三宮訣二卷神仙周天火候金丹訣古嵩子外丹訣黄興金丹訣棲元子登仙經神仙得道靈藥經黄帝大龍經三仙無訣經碧玉經辨道藏名論符天內境保身金鏡九真五書九變昇天經乾寧萬靈集二卷七元丹訣圖混元論三卷玉芝書詩三卷三元内象五行興㫖八靈祕訣金丹立象明真圖東竈還丹經三卷伙義靈元經三卷玉匱祕録指玄三要圖訣茅君註静中吟衆真解大丹詩曲頌金液音丹經趙真人玄中吟元陽玉書神仙保命要訣三卷葛仙公還元真氣訣圖神仙修身養生祕㫖陳真人聖石經洞神隂精至藥玉華丹經保命返魂丹訣孫長生還丹訣三卷玉府夀書玉府壽書記華氐中藏經二卷養生内真保神經人氣經内文龍虎丹經文子家語要言古今刀劍録祕要外丹藥方修仙釋疑階序十四卷仙史𩔗辭十卷六丁神法青城山神仙靈異記三卷三教解紛三卷靈仙賦集二卷證教集鑄劍術天師真符祕要三卷北帝真君授神氣壇法圖三洞樞機二卷周易證墜簡二卷三一帝君真經長生攝養仙經神授正訓玉靈經混元内外鑑參同契心保隂陽統畧參同契三卷參同契金鼎大還丹火記口訣南華真經吕惠卿義解三十三卷丹樓子三卷記聖賦至真語録二卷還丹內象金錀匙塵外記三卷道源傳教圖二卷黃帝鑄鑑二儀通真經三卷宋萬夀道藏三十六部經品目宋萬壽道藏經目録十卷金萬壽道藏三十六部經品目金萬壽道藏經目録十卷修真文苑二十卷煙霞録十卷無山黃籙太齋精要八卷繹仙傳十卷婺仙傳四卷道藏闕經目録卷下道藏尊經歷代綱目域中四大道太為先極判三才非道不立夫道者範圍天地統理人倫生成萬物恹張萬化天理之自然者也易曰立天之道曰隂興陽立地之道曰柔興剛立人之道曰仁與義蓋人者氣禀隂陽之和體具剛柔之性心梗仁義之端一身之中三才道備所以興天地並立也惜乎混沌鑿而純和散澆漓扇而巧偽滋不仁不義不孝不悌禮義廉恥之風喪乖爭淩犯之俗成妬賢嫉能傷生害物滅天理而窮人欲人欲既熾罪業生馬罪業既深凶荒疫癘水火刀兵劫運至矣薄俗相仍莫脫輪迴之苦天尊哀憫大開方便之門下民失道受苦无邊乃演道爲經談玄立教故天書雲箓則元始天尊開其先寳笈瓊章則道君老君繼其後遂說三洞真經洞真演太乗上法九聖之道洞玄演中乗中法九真之道洞神演小乗初法九仙之道三部共一百九十三鍊四千三百八十卷祕在玉京玄都洞天海嶽未盡降世三洞真經又分四輔洞真則太玄輔之洞玄則太平輔之洞神則太清正一輔之凡七科號三洞四輔自伏羲神農之後至殷湯武丁以前歷聖相傳經文流布者一萬五千餘卷其諸真文所受修行得道之經行於世者計二萬九百八十卷上三皇中三皇下三皇九皇所受謂之玄經天皇地皇人皇所受曰内文五方五帝所受曰真文受經修行功行圓備證品凡七果位道門戒品一千五百二十七戒隨法所受檢制修行道門科品三十六卷科令檢制所受及傳道品格道門律品四十卷制御鬼卷條録罪福至如章奏符圖論儀傅記諸醮方術諸䟽法律經義凡十四部計一千六百二十七卷皆隨經入藏儒書醫書隂陽卜筮諸子百家皆興焉宋簡寂先生陸修靜經目藏經一萬八千一百卷宋明帝太始七年考功郞中校勘僅存六千三百有餘卷後周法師王延珠囊經目藏經八千三十卷唐尹文操玉緯經目藏經七千三百卷唐明皇御製瓊綱經目藏經五千七百卷唐文宗太和二年太清宫使奏陳止見五千三百定數黄巢之亂靈文祕軸焚蕩之餘散元統紀幸有神隠子收合餘燼拾遺補闕復為三洞經再經五季亂離篇章雜揉㑹逢炎宋紹隆聖眀相繼奐求瓊軸大構銀題申命校儲条章森矵録臘藏卷目之首冠寳文統録之名大闡玄風武弘道化丙申屬難經藏俱廢元啓運有披雲子宋真人收索到藏經七千八百餘秩鋟梓於平陽府永樂鎮東祖庭藏之此道藏經歷朝興廢之大者也敬刻之石俾百世之後尋經目者有攷證焉至元十二年儆次乙亥九月望日立石道藏尊經歷代網目
